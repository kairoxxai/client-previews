<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Tom's Unpowered Cube</title>
<link href="https://fonts.googleapis.com/css2?family=Cinzel+Decorative:wght@400;700;900&family=Crimson+Pro:ital,wght@0,300;0,400;0,600;1,300;1,400&family=JetBrains+Mono:wght@300;400&display=swap" rel="stylesheet">
<style>
  :root {
    --w: #f5e6c8;
    --u: #1a6b9a;
    --b: #1a0a2e;
    --r: #8b1a1a;
    --g: #1a4d2e;
    --gold: #c9a84c;
    --artifact: #8a9bb0;
    --land: #5c4a2a;
    --bg: #0d0a14;
    --surface: #13101e;
    --border: #2a2040;
    --text: #e8dcc8;
    --muted: #7a6e8a;
    --accent: #c9a84c;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Crimson Pro', Georgia, serif;
    min-height: 100vh;
    overflow-x: hidden;
  }

  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background-image:
      radial-gradient(1px 1px at 20% 30%, rgba(255,255,255,0.15) 0%, transparent 100%),
      radial-gradient(1px 1px at 80% 10%, rgba(255,255,255,0.1) 0%, transparent 100%),
      radial-gradient(1px 1px at 50% 70%, rgba(255,255,255,0.08) 0%, transparent 100%),
      radial-gradient(1px 1px at 10% 80%, rgba(255,255,255,0.12) 0%, transparent 100%),
      radial-gradient(1px 1px at 90% 60%, rgba(255,255,255,0.1) 0%, transparent 100%),
      radial-gradient(2px 2px at 35% 15%, rgba(201,168,76,0.15) 0%, transparent 100%),
      radial-gradient(2px 2px at 65% 85%, rgba(201,168,76,0.1) 0%, transparent 100%);
    pointer-events: none;
    z-index: 0;
  }

  body::after {
    content: '';
    position: fixed;
    inset: 0;
    background: radial-gradient(ellipse at center, transparent 40%, rgba(0,0,0,0.7) 100%);
    pointer-events: none;
    z-index: 0;
  }

  .container { position: relative; z-index: 1; max-width: 1400px; margin: 0 auto; padding: 0 24px; }

  header {
    text-align: center;
    padding: 64px 24px 40px;
    position: relative;
  }

  header::before {
    content: '';
    position: absolute;
    top: 0; left: 50%; transform: translateX(-50%);
    width: 600px; height: 2px;
    background: linear-gradient(90deg, transparent, var(--gold), transparent);
  }

  .mana-row {
    display: flex;
    justify-content: center;
    gap: 12px;
    margin-bottom: 24px;
    animation: fadeDown 0.8s ease both;
  }

  .mana-sym {
    width: 32px; height: 32px;
    border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    font-size: 14px; font-weight: 700;
    font-family: 'JetBrains Mono', monospace;
    border: 2px solid rgba(255,255,255,0.2);
    transition: transform 0.2s, box-shadow 0.2s;
    cursor: default;
  }
  .mana-sym:hover { transform: scale(1.3); }
  .sym-w { background: #e8d8b0; color: #4a3a1a; box-shadow: 0 0 12px rgba(232,216,176,0.3); }
  .sym-u { background: #1a6b9a; color: #d0eeff; box-shadow: 0 0 12px rgba(26,107,154,0.4); }
  .sym-b { background: #2d1a4a; color: #d0b8ff; box-shadow: 0 0 12px rgba(77,40,130,0.4); }
  .sym-r { background: #8b1a1a; color: #ffd0d0; box-shadow: 0 0 12px rgba(139,26,26,0.4); }
  .sym-g { background: #1a4d2e; color: #b0ffd0; box-shadow: 0 0 12px rgba(26,77,46,0.4); }

  h1 {
    font-family: 'Cinzel Decorative', serif;
    font-size: clamp(28px, 5vw, 56px);
    font-weight: 900;
    letter-spacing: 0.08em;
    background: linear-gradient(135deg, #e8c87a 0%, #f5e6c8 40%, #c9a84c 70%, #8b6914 100%);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
    animation: fadeDown 0.8s 0.1s ease both;
    text-shadow: none;
  }

  .subtitle {
    font-size: 14px;
    letter-spacing: 0.3em;
    text-transform: uppercase;
    color: var(--muted);
    margin-top: 8px;
    font-family: 'JetBrains Mono', monospace;
    animation: fadeDown 0.8s 0.2s ease both;
  }

  .header-rule {
    width: 200px; height: 1px;
    background: linear-gradient(90deg, transparent, var(--gold), transparent);
    margin: 20px auto 0;
    animation: fadeDown 0.8s 0.3s ease both;
  }

  .stats-bar {
    display: flex;
    justify-content: center;
    gap: 40px;
    padding: 24px;
    border-top: 1px solid var(--border);
    border-bottom: 1px solid var(--border);
    margin: 0 0 40px;
    animation: fadeUp 0.8s 0.4s ease both;
    flex-wrap: wrap;
  }

  .stat { text-align: center; min-width: 80px; }
  .stat-num { font-family: 'Cinzel Decorative', serif; font-size: 28px; color: var(--gold); line-height: 1; }
  .stat-label { font-size: 11px; letter-spacing: 0.2em; text-transform: uppercase; color: var(--muted); margin-top: 4px; font-family: 'JetBrains Mono', monospace; }
  .stat-divider { width: 1px; background: var(--border); align-self: stretch; }

  .search-wrap {
    margin: 0 auto 32px;
    max-width: 500px;
    position: relative;
    animation: fadeUp 0.8s 0.5s ease both;
  }

  .search-wrap input {
    width: 100%;
    padding: 14px 48px 14px 20px;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 4px;
    color: var(--text);
    font-family: 'Crimson Pro', serif;
    font-size: 18px;
    outline: none;
    transition: border-color 0.2s, box-shadow 0.2s;
  }

  .search-wrap input:focus {
    border-color: var(--gold);
    box-shadow: 0 0 0 3px rgba(201,168,76,0.1);
  }

  .search-wrap input::placeholder { color: var(--muted); }

  .search-icon {
    position: absolute;
    right: 16px; top: 50%; transform: translateY(-50%);
    color: var(--muted);
    font-size: 18px;
    pointer-events: none;
  }

  .search-results-count {
    text-align: center;
    font-size: 13px;
    font-family: 'JetBrains Mono', monospace;
    color: var(--muted);
    margin-bottom: 24px;
    min-height: 20px;
    transition: opacity 0.2s;
  }

  .tabs {
    display: flex;
    gap: 0;
    border-bottom: 1px solid var(--border);
    margin-bottom: 32px;
    overflow-x: auto;
    animation: fadeUp 0.8s 0.5s ease both;
    scrollbar-width: none;
  }
  .tabs::-webkit-scrollbar { display: none; }

  .tab {
    padding: 12px 20px;
    font-size: 12px;
    letter-spacing: 0.15em;
    text-transform: uppercase;
    font-family: 'JetBrains Mono', monospace;
    color: var(--muted);
    cursor: pointer;
    border-bottom: 2px solid transparent;
    margin-bottom: -1px;
    white-space: nowrap;
    transition: color 0.2s, border-color 0.2s;
    background: none;
    border-top: none;
    border-left: none;
    border-right: none;
    display: flex;
    align-items: center;
    gap: 8px;
  }
  .tab:hover { color: var(--text); }
  .tab.active { color: var(--gold); border-bottom-color: var(--gold); }

  .tab-dot { width: 8px; height: 8px; border-radius: 50%; display: inline-block; flex-shrink: 0; }

  .color-section { margin-bottom: 48px; animation: fadeUp 0.5s ease both; }

  .section-header { display: flex; align-items: center; gap: 16px; margin-bottom: 20px; }

  .section-title { font-family: 'Cinzel Decorative', serif; font-size: 18px; letter-spacing: 0.08em; color: var(--text); }

  .section-count {
    font-family: 'JetBrains Mono', monospace;
    font-size: 12px;
    color: var(--muted);
    border: 1px solid var(--border);
    padding: 2px 8px;
    border-radius: 12px;
  }

  .section-line { flex: 1; height: 1px; background: linear-gradient(90deg, var(--border), transparent); }

  .cmc-grid {
    display: grid;
    grid-template-columns: repeat(7, 1fr);
    gap: 2px;
  }
  @media (max-width: 900px) { .cmc-grid { grid-template-columns: repeat(4, 1fr); } }
  @media (max-width: 600px) { .cmc-grid { grid-template-columns: repeat(2, 1fr); } }

  .cmc-col { background: var(--surface); border: 1px solid var(--border); border-radius: 4px; overflow: hidden; }

  .cmc-header {
    padding: 8px 12px;
    font-family: 'JetBrains Mono', monospace;
    font-size: 11px;
    letter-spacing: 0.1em;
    border-bottom: 1px solid var(--border);
    display: flex;
    justify-content: space-between;
    align-items: center;
  }

  .cmc-num { font-weight: 700; }
  .cmc-total { opacity: 0.5; }
  .cmc-cards { padding: 8px; }

  .card-pill {
    display: block;
    padding: 5px 8px;
    margin-bottom: 2px;
    border-radius: 3px;
    font-size: 13px;
    font-family: 'Crimson Pro', serif;
    cursor: pointer;
    transition: background 0.15s, transform 0.15s, opacity 0.2s;
    border: 1px solid transparent;
    line-height: 1.3;
    text-decoration: none;
    color: var(--text);
    position: relative;
  }

  .card-pill:hover {
    background: rgba(201,168,76,0.08);
    border-color: rgba(201,168,76,0.2);
    transform: translateX(2px);
    color: var(--gold);
  }

  .card-pill.hidden { display: none; }

  .tint-w .card-pill { border-left: 2px solid rgba(232,216,176,0.4); }
  .tint-u .card-pill { border-left: 2px solid rgba(26,107,154,0.6); }
  .tint-b .card-pill { border-left: 2px solid rgba(100,40,160,0.5); }
  .tint-r .card-pill { border-left: 2px solid rgba(180,40,40,0.5); }
  .tint-g .card-pill { border-left: 2px solid rgba(40,130,70,0.5); }
  .tint-gold .card-pill { border-left: 2px solid rgba(201,168,76,0.6); }
  .tint-artifact .card-pill { border-left: 2px solid rgba(138,155,176,0.5); }
  .tint-land .card-pill { border-left: 2px solid rgba(120,90,40,0.5); }

  .color-w .cmc-header { background: rgba(232,216,176,0.06); }
  .color-u .cmc-header { background: rgba(26,107,154,0.1); }
  .color-b .cmc-header { background: rgba(60,20,100,0.1); }
  .color-r .cmc-header { background: rgba(139,26,26,0.1); }
  .color-g .cmc-header { background: rgba(26,77,46,0.1); }
  .color-gold .cmc-header { background: rgba(201,168,76,0.08); }
  .color-artifact .cmc-header { background: rgba(138,155,176,0.08); }
  .color-land .cmc-header { background: rgba(92,74,42,0.1); }

  .guild-grid {
    display: grid;
    grid-template-columns: repeat(5, 1fr);
    gap: 12px;
    margin-bottom: 12px;
  }
  @media (max-width: 900px) { .guild-grid { grid-template-columns: repeat(3, 1fr); } }
  @media (max-width: 600px) { .guild-grid { grid-template-columns: repeat(2, 1fr); } }

  .guild-card { background: var(--surface); border: 1px solid var(--border); border-radius: 4px; overflow: hidden; transition: border-color 0.2s; }
  .guild-card:hover { border-color: var(--gold); }

  .guild-header {
    padding: 10px 14px;
    font-family: 'Cinzel Decorative', serif;
    font-size: 12px;
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 8px;
  }

  .guild-pips { display: flex; gap: 3px; }
  .pip { width: 10px; height: 10px; border-radius: 50%; }
  .guild-body { padding: 8px 12px; }
  .guild-body .card-pill { font-size: 13px; padding: 4px 6px; }

  .archetype-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(260px, 1fr)); gap: 16px; }

  .archetype-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 6px;
    padding: 20px;
    position: relative;
    overflow: hidden;
    transition: border-color 0.2s, transform 0.2s;
  }
  .archetype-card::before { content: ''; position: absolute; top: 0; left: 0; right: 0; height: 3px; }
  .archetype-card:hover { border-color: var(--gold); transform: translateY(-2px); }

  .archetype-name { font-family: 'Cinzel Decorative', serif; font-size: 14px; color: var(--gold); margin-bottom: 6px; }
  .archetype-guild { font-family: 'JetBrains Mono', monospace; font-size: 11px; letter-spacing: 0.1em; color: var(--muted); margin-bottom: 10px; text-transform: uppercase; }
  .archetype-desc { font-size: 15px; line-height: 1.5; color: #c8bca8; font-style: italic; }
  .archetype-keys { margin-top: 12px; display: flex; flex-wrap: wrap; gap: 4px; }
  .key-tag { background: rgba(201,168,76,0.08); border: 1px solid rgba(201,168,76,0.2); padding: 2px 8px; border-radius: 12px; font-size: 12px; font-family: 'JetBrains Mono', monospace; color: var(--gold); }

  .curve-section { margin-bottom: 48px; }
  .curve-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(220px, 1fr)); gap: 20px; }

  .curve-card { background: var(--surface); border: 1px solid var(--border); border-radius: 6px; padding: 16px; }
  .curve-title { font-family: 'Cinzel Decorative', serif; font-size: 13px; margin-bottom: 12px; display: flex; align-items: center; gap: 8px; }
  .curve-bars { display: flex; align-items: flex-end; gap: 4px; height: 60px; }
  .curve-bar-wrap { flex: 1; display: flex; flex-direction: column; align-items: center; gap: 3px; height: 100%; justify-content: flex-end; }
  .curve-bar { width: 100%; border-radius: 2px 2px 0 0; min-height: 2px; transition: height 0.4s ease; position: relative; }
  .curve-bar-num { font-family: 'JetBrains Mono', monospace; font-size: 9px; color: var(--muted); }
  .curve-label { font-family: 'JetBrains Mono', monospace; font-size: 9px; color: var(--muted); margin-top: 4px; }

  .panel { display: none; }
  .panel.active { display: block; animation: fadeUp 0.4s ease both; }

  /* ── FEATURE 1: IMAGE TOOLTIP ── */
  .tooltip {
    position: fixed;
    z-index: 9000;
    pointer-events: none;
    opacity: 0;
    transition: opacity 0.18s ease;
    filter: drop-shadow(0 12px 40px rgba(0,0,0,0.9));
  }
  .tooltip.visible { opacity: 1; }
  .tooltip-img {
    display: block;
    width: 220px;
    border-radius: 10px;
    border: 1px solid rgba(201,168,76,0.3);
  }
  .tooltip-fallback {
    background: var(--surface);
    border: 1px solid var(--gold);
    border-radius: 6px;
    padding: 10px 14px;
    max-width: 240px;
    box-shadow: 0 8px 32px rgba(0,0,0,0.8);
  }
  .tooltip-name { font-family: 'Cinzel Decorative', serif; font-size: 13px; color: var(--gold); margin-bottom: 4px; }
  .tooltip-info { font-size: 12px; font-family: 'JetBrains Mono', monospace; color: var(--muted); }

  @keyframes fadeDown { from { opacity: 0; transform: translateY(-16px); } to { opacity: 1; transform: translateY(0); } }
  @keyframes fadeUp   { from { opacity: 0; transform: translateY(16px);  } to { opacity: 1; transform: translateY(0); } }

  ::-webkit-scrollbar { width: 6px; }
  ::-webkit-scrollbar-track { background: var(--bg); }
  ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }
  ::-webkit-scrollbar-thumb:hover { background: var(--muted); }

  footer { text-align: center; padding: 40px 24px; border-top: 1px solid var(--border); margin-top: 64px; font-family: 'JetBrains Mono', monospace; font-size: 11px; color: var(--muted); letter-spacing: 0.15em; }

  .color-pip-w { color: #e8d8b0; }
  .color-pip-u { color: #5ab4e8; }
  .color-pip-b { color: #b090e0; }
  .color-pip-r { color: #e86060; }
  .color-pip-g { color: #60cc80; }

  .card-pill.match { background: rgba(201,168,76,0.06); }
  .card-pill.no-match { opacity: 0.2; }

  /* PACK BUTTON */
  .pack-btn-wrap {
    display: flex;
    justify-content: center;
    gap: 12px;
    margin-bottom: 32px;
    animation: fadeUp 0.8s 0.6s ease both;
    flex-wrap: wrap;
  }

  .open-pack-btn, .import-cube-btn {
    background: linear-gradient(135deg, #1a1228, #2a1a3e);
    border: 1px solid var(--gold);
    color: var(--gold);
    font-family: 'Cinzel Decorative', serif;
    font-size: 15px;
    letter-spacing: 0.12em;
    padding: 14px 36px;
    border-radius: 4px;
    cursor: pointer;
    position: relative;
    overflow: hidden;
    transition: background 0.2s, box-shadow 0.2s, transform 0.15s;
    display: flex;
    align-items: center;
    gap: 12px;
  }

  .import-cube-btn {
    border-color: rgba(201,168,76,0.5);
    font-size: 13px;
    padding: 14px 28px;
  }

  .open-pack-btn::before, .import-cube-btn::before {
    content: '';
    position: absolute;
    inset: 0;
    background: linear-gradient(135deg, rgba(201,168,76,0.08), transparent);
    opacity: 0;
    transition: opacity 0.2s;
  }

  .open-pack-btn:hover, .import-cube-btn:hover {
    box-shadow: 0 0 24px rgba(201,168,76,0.25), 0 0 48px rgba(201,168,76,0.1);
    transform: translateY(-1px);
  }
  .open-pack-btn:hover::before, .import-cube-btn:hover::before { opacity: 1; }
  .open-pack-btn:active, .import-cube-btn:active { transform: translateY(1px); }
  .pack-icon { font-size: 20px; }

  /* PACK MODAL */
  .pack-overlay {
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.85);
    z-index: 2000;
    display: flex;
    align-items: center;
    justify-content: center;
    opacity: 0;
    pointer-events: none;
    transition: opacity 0.3s;
    backdrop-filter: blur(4px);
    padding: 20px;
  }
  .pack-overlay.open { opacity: 1; pointer-events: all; }

  .pack-modal {
    background: var(--surface);
    border: 1px solid var(--gold);
    border-radius: 8px;
    width: 100%;
    max-width: 680px;
    max-height: 90vh;
    overflow-y: auto;
    box-shadow: 0 0 60px rgba(201,168,76,0.15), 0 32px 80px rgba(0,0,0,0.8);
    transform: translateY(20px) scale(0.97);
    transition: transform 0.3s ease;
  }
  .pack-overlay.open .pack-modal { transform: translateY(0) scale(1); }

  .pack-modal-header {
    padding: 24px 28px 20px;
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: center;
    justify-content: space-between;
  }

  .pack-modal-title { font-family: 'Cinzel Decorative', serif; font-size: 16px; color: var(--gold); display: flex; align-items: center; gap: 10px; }

  .pack-close {
    background: none;
    border: 1px solid var(--border);
    color: var(--muted);
    width: 32px; height: 32px;
    border-radius: 50%;
    cursor: pointer;
    font-size: 16px;
    display: flex; align-items: center; justify-content: center;
    transition: border-color 0.2s, color 0.2s;
  }
  .pack-close:hover { border-color: var(--gold); color: var(--gold); }

  .pack-cards-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 8px; padding: 20px 24px; }
  @media (max-width: 500px) { .pack-cards-grid { grid-template-columns: repeat(2, 1fr); } }

  .pack-card-item {
    background: var(--bg);
    border: 1px solid var(--border);
    border-radius: 6px;
    padding: 12px 14px;
    display: flex;
    flex-direction: column;
    gap: 6px;
    opacity: 0;
    transform: translateY(10px);
    transition: opacity 0.25s ease, transform 0.25s ease, border-color 0.2s;
    cursor: pointer;
    text-decoration: none;
  }
  .pack-card-item:hover { border-color: var(--gold); background: rgba(201,168,76,0.04); }
  .pack-card-item.revealed { opacity: 1; transform: translateY(0); }

  .pack-card-name { font-family: 'Crimson Pro', serif; font-size: 15px; color: var(--text); line-height: 1.3; }
  .pack-card-meta { font-family: 'JetBrains Mono', monospace; font-size: 10px; color: var(--muted); display: flex; align-items: center; gap: 6px; }
  .pack-card-color-dot { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; }

  .pack-modal-footer { padding: 16px 24px 24px; border-top: 1px solid var(--border); display: flex; gap: 12px; justify-content: center; }

  .pack-again-btn {
    background: linear-gradient(135deg, #1a1228, #2a1a3e);
    border: 1px solid var(--gold);
    color: var(--gold);
    font-family: 'Cinzel Decorative', serif;
    font-size: 12px;
    letter-spacing: 0.1em;
    padding: 10px 24px;
    border-radius: 4px;
    cursor: pointer;
    transition: box-shadow 0.2s, transform 0.15s;
  }
  .pack-again-btn:hover { box-shadow: 0 0 16px rgba(201,168,76,0.2); transform: translateY(-1px); }

  .pack-dismiss-btn {
    background: none;
    border: 1px solid var(--border);
    color: var(--muted);
    font-family: 'JetBrains Mono', monospace;
    font-size: 11px;
    letter-spacing: 0.1em;
    padding: 10px 24px;
    border-radius: 4px;
    cursor: pointer;
    transition: border-color 0.2s, color 0.2s;
  }
  .pack-dismiss-btn:hover { border-color: var(--muted); color: var(--text); }

  .pack-count-badge {
    font-family: 'JetBrains Mono', monospace;
    font-size: 11px;
    color: var(--muted);
    background: rgba(255,255,255,0.04);
    border: 1px solid var(--border);
    padding: 2px 8px;
    border-radius: 12px;
  }

  /* ── FEATURE 3: ARCHETYPE SECTION HEADERS (imported view) ── */

  if (scryfallRunning) return;
  scryfallRunning = true;
  while (scryfallQueue.length > 0) {
    const task = scryfallQueue.shift();
    const now = Date.now();
    const wait = Math.max(0, SCRYFALL_DELAY - (now - lastScryfallTime));
    if (wait > 0) await scryfallDelay(wait);
    lastScryfallTime = Date.now();
    try {
      const res = await fetch(`https://api.scryfall.com/cards/named?fuzzy=${encodeURIComponent(task.name)}`);
      if (!res.ok) { cardCache.set(task.key, null); task.resolve(null); continue; }
      const data = await res.json();
      const imageUrl = (data.image_uris && data.image_uris.normal)
        || (data.card_faces && data.card_faces[0] && data.card_faces[0].image_uris && data.card_faces[0].image_uris.normal)
        || null;
      const result = {
        imageUrl,
        name: data.name,
        cmc: data.cmc || 0,
        colorIdentity: data.color_identity || [],
        typeLine: data.type_line || '',
      };
      cardCache.set(task.key, result);
      task.resolve(result);
    } catch(e) {
      cardCache.set(task.key, null);
      task.resolve(null);
    }
  }
  scryfallRunning = false;
}

function fetchCard(name) {
  const key = name.toLowerCase();
  if (cardCache.has(key)) return Promise.resolve(cardCache.get(key));
  return new Promise(resolve => {
    scryfallQueue.push({ name, key, resolve });
    runScryfallQueue();
  });
}

// ===================== TOOLTIP (IMAGE) =====================
const tooltip    = document.getElementById('tooltip');
const ttImg      = document.getElementById('tt-img');
const ttFallback = document.getElementById('tt-fallback');
const ttName     = document.getElementById('tt-name');

let tooltipHoverTimer = null;
let tooltipCurrentCard = null;

function positionTooltip(e) {
  const W = window.innerWidth, H = window.innerHeight;
  const TW = 232, TH = ttImg.style.display !== 'none' ? 324 : 72;
  let x = e.clientX + 18, y = e.clientY - 10;
  if (x + TW > W - 8) x = e.clientX - TW - 12;
  if (y + TH > H - 8) y = H - TH - 8;
  if (y < 8) y = 8;
  tooltip.style.left = x + 'px';
  tooltip.style.top  = y + 'px';
}

function showTooltip(e) {
  const card = e.currentTarget;
  tooltipCurrentCard = card;
  const name = card.dataset.cardName || card.textContent.trim();

  // Show name text fallback immediately
  ttImg.style.display = 'none';
  ttFallback.style.display = 'block';
  ttName.textContent = name;
  tooltip.classList.add('visible');
  positionTooltip(e);

  clearTimeout(tooltipHoverTimer);
  tooltipHoverTimer = setTimeout(() => {
    if (tooltipCurrentCard !== card) return;
    fetchCard(name).then(data => {
      if (tooltipCurrentCard !== card) return;
      if (data && data.imageUrl) {
        const img = new Image();
        img.onload = () => {
          if (tooltipCurrentCard !== card) return;
          ttImg.src = data.imageUrl;
          ttImg.style.display = 'block';
          ttFallback.style.display = 'none';
        };
        img.src = data.imageUrl;
      }
    });
  }, 120);
}

function hideTooltip() {
  tooltipCurrentCard = null;
  clearTimeout(tooltipHoverTimer);
  tooltip.classList.remove('visible');
  // Delay clearing src so fade-out is smooth
  setTimeout(() => {
    if (!tooltip.classList.contains('visible')) {
      ttImg.src = '';
      ttImg.style.display = 'none';
      ttFallback.style.display = 'block';
    }
  }, 200);
}

function moveTooltip(e) { positionTooltip(e); }

// ===================== HELPERS =====================
const pipColor = { w:'#e8d8b0', u:'#5ab4e8', b:'#9060d0', r:'#e86060', g:'#60cc80' };
const barColor = { w:'rgba(232,216,176,0.7)', u:'rgba(90,180,232,0.7)', b:'rgba(144,96,208,0.7)', r:'rgba(232,96,96,0.7)', g:'rgba(96,204,128,0.7)' };

function makeCard(name, extraClass = '') {
  const el = document.createElement('a');
  el.className = `card-pill ${extraClass}`;
  el.textContent = name;
  el.href = `https://scryfall.com/search?q=${encodeURIComponent(name)}`;
  el.target = '_blank';
  el.rel = 'noopener';
  el.dataset.name = name.toLowerCase();
  el.dataset.cardName = name;
  el.addEventListener('mouseenter', showTooltip);
  el.addEventListener('mouseleave', hideTooltip);
  el.addEventListener('mousemove', moveTooltip);
  return el;
}

function buildCMCSection(cmcData, colorKey) {
  const cmcLabels = ['1','2','3','4','5','6+','X'];
  const section = document.createElement('div');
  section.className = 'color-section';
  const cards = [];
  const grid = document.createElement('div');
  grid.className = 'cmc-grid';

  cmcLabels.forEach(cmc => {
    const col = document.createElement('div');
    col.className = `cmc-col color-${colorKey}`;
    const list = cmcData[cmc] || [];
    const hdr = document.createElement('div');
    hdr.className = 'cmc-header';
    hdr.innerHTML = `<span class="cmc-num">${cmc} CMC</span><span class="cmc-total">${list.length}</span>`;
    col.appendChild(hdr);
    const body = document.createElement('div');
    body.className = `cmc-cards tint-${colorKey}`;
    list.forEach(name => {
      const pill = makeCard(name);
      body.appendChild(pill);
      cards.push(pill);
    });
    col.appendChild(body);
    grid.appendChild(col);
  });

  section.appendChild(grid);
  return { section, cards };
}

function countAll() {
  let n = 0;
  Object.values(CUBE).forEach(c => {
    Object.values(c.creatures || {}).forEach(a => n += a.length);
    Object.values(c.spells    || {}).forEach(a => n += a.length);
  });
  Object.values(MULTICOLOR).forEach(g => n += g.cards.length);
  Object.values(ARTIFACTS).forEach(a => n += a.length);
  Object.values(LANDS).forEach(a => n += a.length);
  return n;
}

function buildCurve(containerId, cmcObj, colorKey) {
  const cmcLabels = ['1','2','3','4','5','6+','X'];
  const counts = cmcLabels.map(k => (cmcObj[k] || []).length);
  const max = Math.max(...counts, 1);
  const container = document.getElementById(containerId);
  if (!container) return;
  cmcLabels.forEach((label, i) => {
    const wrap = document.createElement('div');
    wrap.className = 'curve-bar-wrap';
    const bar = document.createElement('div');
    bar.className = 'curve-bar';
    bar.style.height = (Math.round((counts[i] / max) * 52) || 2) + 'px';
    bar.style.background = barColor[colorKey] || 'rgba(201,168,76,0.6)';
    const num = document.createElement('div');
    num.className = 'curve-bar-num';
    num.textContent = counts[i] || '';
    const lbl = document.createElement('div');
    lbl.className = 'curve-label';
    lbl.textContent = label;
    wrap.appendChild(bar); wrap.appendChild(num); wrap.appendChild(lbl);
    container.appendChild(wrap);
  });
}

function renderFullCurve() {
  const grid = document.getElementById('full-curve-grid');
  const colorKeys = ['w','u','b','r','g'];
  const colorNames = { w:'White', u:'Blue', b:'Black', r:'Red', g:'Green' };
  const colorAccent = { w:'#e8d8b0', u:'#5ab4e8', b:'#9060d0', r:'#e86060', g:'#60cc80' };
  colorKeys.forEach(ck => {
    const data = CUBE[Object.keys(CUBE).find(k => CUBE[k].color === ck)];
    if (!data) return;
    const all = {};
    ['1','2','3','4','5','6+','X'].forEach(cmc => {
      all[cmc] = [...(data.creatures[cmc] || []), ...(data.spells[cmc] || [])];
    });
    const max = Math.max(...Object.values(all).map(a => a.length), 1);
    const card = document.createElement('div');
    card.className = 'curve-card';
    card.innerHTML = `<div class="curve-title"><span style="color:${colorAccent[ck]}">◈</span> ${colorNames[ck]}</div>`;
    const bars = document.createElement('div');
    bars.className = 'curve-bars';
    ['1','2','3','4','5','6+','X'].forEach(cmc => {
      const count = (all[cmc] || []).length;
      const wrap = document.createElement('div'); wrap.className = 'curve-bar-wrap';
      const bar = document.createElement('div'); bar.className = 'curve-bar';
      bar.style.height = Math.max(2, Math.round((count / max) * 52)) + 'px';
      bar.style.background = barColor[ck];
      const num = document.createElement('div'); num.className = 'curve-bar-num'; num.textContent = count || '';
      const lbl = document.createElement('div'); lbl.className = 'curve-label'; lbl.textContent = cmc;
      wrap.append(bar, num, lbl);
      bars.appendChild(wrap);
    });
    card.appendChild(bars);
    grid.appendChild(card);
  });
}

// ===================== FEATURE 3: IMPORTED ARCHETYPE DISPLAY =====================
function renderImportedArchetypes(archetypes) {
  // archetypes: [{name, cards: [{name, cmc, colorIdentity, typeLine, imageUrl}]}]
  const panel = document.getElementById('panel-archetypes');
  panel.innerHTML = '';

  archetypes.forEach(arch => {
    const section = document.createElement('div');
    section.className = 'arch-section';

    // Header
    const hdr = document.createElement('div');
    hdr.className = 'arch-section-header';
    const totalCards = arch.cards.length;
    hdr.innerHTML = `
      <span class="arch-section-gem">◆</span>
      <span class="arch-section-title">${escapeHtml(arch.name)}</span>
      <div class="arch-section-line"></div>
      <span class="arch-section-count">${totalCards} card${totalCards !== 1 ? 's' : ''}</span>
    `;
    section.appendChild(hdr);

    // Group cards by CMC for the grid
    const byBucket = {};
    arch.cards.forEach(card => {
      const cmc = card.cmc;
      let bucket;
      if (cmc === 0 && card.typeLine && card.typeLine.toLowerCase().includes('land')) {
        bucket = 'land';
      } else if (cmc >= 6) {
        bucket = '6+';
      } else {
        bucket = String(Math.floor(cmc)) || '0';
      }
      if (!byBucket[bucket]) byBucket[bucket] = [];
      byBucket[bucket].push(card.name);
    });

    const { section: cmcSection, cards: newCards } = buildCMCSection(byBucket, 'gold');
    section.appendChild(cmcSection);
    allCards.push(...newCards);
    panel.appendChild(section);
  });
}

function escapeHtml(str) {
  return str.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

  searchInput.value = '';

  if (activeTab) savedTab = activeTab.dataset.tab || 'overview';
});

  const q = searchInput.value.trim().toLowerCase();

  // Hide all panels, show search panel
  document.querySelectorAll('.panel').forEach(p => { p.classList.remove('active'); p.style.display = 'none'; });

// ===================== PACK SIMULATOR =====================
const colorDotMap   = { w:'#e8d8b0', u:'#5ab4e8', b:'#9060d0', r:'#e86060', g:'#60cc80', gold:'#c9a84c', artifact:'#8a9bb0', land:'#8b6930' };
const colorLabelMap = { w:'White', u:'Blue', b:'Black', r:'Red', g:'Green', gold:'Multicolor', artifact:'Artifact', land:'Land' };

function buildFullCardPool() {
  const pool = [];
  Object.values(CUBE).forEach(data => {
    const ck = data.color;
    Object.values(data.creatures || {}).forEach(arr => arr.forEach(name => pool.push({ name, color: ck })));
    Object.values(data.spells    || {}).forEach(arr => arr.forEach(name => pool.push({ name, color: ck })));
  });
  Object.values(MULTICOLOR).forEach(guild => guild.cards.forEach(name => pool.push({ name, color: 'gold' })));
  Object.values(ARTIFACTS).forEach(arr => arr.forEach(name => pool.push({ name, color: 'artifact' })));
  Object.values(LANDS).forEach(arr => arr.forEach(name => pool.push({ name, color: 'land' })));
  return pool;
}

function shuffle(arr) {
  const a = [...arr];
  for (let i = a.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [a[i], a[j]] = [a[j], a[i]];
  }
  return a;
}

let packOpenCount = 0;

function openPack() {
  packOpenCount++;
  const pool = buildFullCardPool();
  const pack = shuffle(pool).slice(0, 15);
  const grid = document.getElementById('pack-cards-grid');
  grid.innerHTML = '';
  pack.forEach((card, i) => {
    const item = document.createElement('a');
    item.className = 'pack-card-item';
    item.href = `https://scryfall.com/search?q=${encodeURIComponent(card.name)}`;
    item.target = '_blank'; item.rel = 'noopener';
    item.innerHTML = `
      <div class="pack-card-name">${card.name}</div>
      <div class="pack-card-meta">
        <div class="pack-card-color-dot" style="background:${colorDotMap[card.color] || '#888'}"></div>
        ${colorLabelMap[card.color] || card.color}
      </div>
    `;
    item.dataset.cardName = card.name;
    item.addEventListener('mouseenter', showTooltip);
    item.addEventListener('mouseleave', hideTooltip);
    item.addEventListener('mousemove', moveTooltip);
    grid.appendChild(item);
    setTimeout(() => item.classList.add('revealed'), i * 60);
  });
  document.getElementById('pack-count-badge').textContent = `Pack #${packOpenCount}`;
  document.getElementById('pack-overlay').classList.add('open');
  document.body.style.overflow = 'hidden';
}

function closePack() {
  document.getElementById('pack-overlay').classList.remove('open');
  document.body.style.overflow = '';
}

document.getElementById('open-pack-btn').addEventListener('click', openPack);
document.getElementById('pack-close-btn').addEventListener('click', closePack);
document.getElementById('pack-again-btn').addEventListener('click', openPack);
document.getElementById('pack-dismiss-btn').addEventListener('click', closePack);
document.getElementById('pack-overlay').addEventListener('click', e => {
  if (e.target === document.getElementById('pack-overlay')) closePack();
});

document.addEventListener('keydown', e => {
  if (e.key === 'Escape') {
    if (document.getElementById('pack-overlay').classList.contains('open')) closePack();
    if (importOverlay.classList.contains('open')) closeImportModal();
  }
});
